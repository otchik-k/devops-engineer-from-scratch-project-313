name: Lint with Ruff

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    

env:
  BADGE_NAME: tests

jobs:
  test:
    runs-on: ubuntu-latest

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ">=3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check --output-format=github .
