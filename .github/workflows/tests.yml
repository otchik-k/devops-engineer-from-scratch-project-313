name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BADGE_NAME: tests_app
  DATABASE_URL: postgresql://hexlet:12345@localhost:5432/stud_db

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ">=3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install Flask
          pip install psycopg2
          pip install sqlmodel

      - name: Run pytest
        run: pytest
