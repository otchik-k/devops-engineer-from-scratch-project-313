name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BADGE_NAME: tests_app
  DATABASE_URL: postgresql://hexlet:12345@localhost:5432/stud_db

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hexlet
          POSTGRES_PASSWORD: 12345
          POSTGRES_DB: stud_db
        ports:
          - 5432:5432
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ">=3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install Flask
          pip install psycopg2
          pip install sqlmodel

      - name: Run pytest
        run: pytest
